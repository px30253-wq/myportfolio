<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pongsakorn Ano | Portfolio</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .profile-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { margin: 15px 0 5px; font-size: 1.5rem; color: #333; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        .btn {
            display: block;
            background: #000;
            color: #fff;
            text-decoration: none;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .btn:hover { background: #333; }
    </style>
</head>
<body>

    <div class="profile-card">
        <!-- วิธีใส่รูป: ใส่ชื่อไฟล์รูปของคุณในช่อง src -->
        <img src="profile.jpg" alt="Pongsakorn Ano" class="profile-img">
        
        <h1>Pongsakorn Ano</h1>
        <p>Logistics & Supply Chain Management Student</p>
        <p>Panyapiwat Institute of Management</p>

        <a href="#" class="btn">Resume</a>
        <a href="#" class="btn">LinkedIn</a>
        <a href="#" class="btn">Contact Me</a>
    </div>

</body>
</html>
